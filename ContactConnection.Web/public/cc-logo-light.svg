<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 100" width="580" height="100">
  <defs>
    <linearGradient id="gFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9"/>
      <stop offset="100%" style="stop-color:#0369A1"/>
    </linearGradient>
    <linearGradient id="gBack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8"/>
      <stop offset="100%" style="stop-color:#0EA5E9"/>
    </linearGradient>
  </defs>

  <!-- CC Icon: two same-size Cs, back one shifted slightly up-left, front one slightly down-right -->
  <!-- Icon is centered around 50,50 within a 100x100 space -->
  <!-- Back C: nudged up 8px and left 6px from center -->
  <path d="M 50 14 A 26 26 0 1 0 50 66" fill="none" stroke="url(#gBack)" stroke-width="8.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Front C: nudged down 8px and right 6px from center -->
  <path d="M 62 34 A 26 26 0 1 0 62 86" fill="none" stroke="url(#gFront)" stroke-width="8.5" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="112" y="62"
    font-family="'Trebuchet MS', 'Segoe UI', sans-serif"
    font-size="36"
    letter-spacing="-0.5">
    <tspan font-weight="700" fill="#0F172A">Contact</tspan><tspan font-weight="300" fill="#0EA5E9">Connection</tspan>
  </text>

  <!-- Tagline -->
  <text x="113" y="78"
    font-family="'Trebuchet MS', 'Segoe UI', sans-serif"
    font-size="9.5"
    font-weight="400"
    letter-spacing="3"
    fill="#1E293B">CALL CENTER PLATFORM</text>
</svg>

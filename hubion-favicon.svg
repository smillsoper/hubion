<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0369A1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="white" stroke-width="1" opacity="0.25"/>

  <!-- Spokes -->
  <line x1="16" y1="10" x2="16" y2="4.5" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.85"/>
  <line x1="16" y1="22" x2="16" y2="27.5" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.85"/>
  <line x1="10" y1="16" x2="4.5" y2="16" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.85"/>
  <line x1="22" y1="16" x2="27.5" y2="16" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.85"/>

  <!-- Diagonal spokes -->
  <line x1="13" y1="13" x2="9" y2="9" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
  <line x1="19" y1="19" x2="23" y2="23" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
  <line x1="19" y1="13" x2="23" y2="9" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
  <line x1="13" y1="19" x2="9" y2="23" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.45"/>

  <!-- Outer cardinal nodes -->
  <circle cx="16" cy="4.5" r="2.2" fill="white"/>
  <circle cx="27.5" cy="16" r="2.2" fill="white"/>
  <circle cx="16" cy="27.5" r="2.2" fill="white"/>
  <circle cx="4.5" cy="16" r="2.2" fill="white"/>

  <!-- Center hub -->
  <circle cx="16" cy="16" r="5" fill="white" opacity="0.2"/>
  <circle cx="16" cy="16" r="3.5" fill="white"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 56" width="380" height="56">
  <defs>
    <linearGradient id="gFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8"/>
      <stop offset="100%" style="stop-color:#0EA5E9"/>
    </linearGradient>
    <linearGradient id="gBack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7DD3FC"/>
      <stop offset="100%" style="stop-color:#38BDF8"/>
    </linearGradient>
  </defs>

  <rect width="380" height="56" fill="#0A0F1A"/>

  <!-- CC icon: paths shifted down so top clears the frame -->
  <!-- At scale 0.44, original y=14 maps to ~8px. Moving back C down to y=22 gives ~12px top margin -->
  <g transform="translate(2, 0) scale(0.44)">
    <path d="M 50 22 A 26 26 0 1 0 50 74" fill="none" stroke="url(#gBack)" stroke-width="8.5" stroke-linecap="round" opacity="0.3"/>
    <path d="M 62 42 A 26 26 0 1 0 62 94" fill="none" stroke="url(#gFront)" stroke-width="8.5" stroke-linecap="round"/>
  </g>

  <!-- Divider -->
  <line x1="50" y1="8" x2="50" y2="48" stroke="#1E3A5F" stroke-width="1"/>

  <!-- Wordmark -->
  <text x="60" y="35"
    font-family="'Trebuchet MS', 'Segoe UI', sans-serif"
    font-size="17"
    letter-spacing="-0.3">
    <tspan font-weight="700" fill="#FFFFFF">Contact</tspan><tspan font-weight="300" fill="#38BDF8">Connection</tspan>
  </text>
</svg>

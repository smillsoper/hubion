<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 100" width="580" height="100">
  <defs>
    <linearGradient id="gFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8"/>
      <stop offset="100%" style="stop-color:#0EA5E9"/>
    </linearGradient>
    <linearGradient id="gBack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7DD3FC"/>
      <stop offset="100%" style="stop-color:#38BDF8"/>
    </linearGradient>
  </defs>

  <rect width="580" height="100" fill="#0A0F1A"/>

  <!-- Back C: nudged up-left -->
  <path d="M 50 14 A 26 26 0 1 0 50 66" fill="none" stroke="url(#gBack)" stroke-width="8.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Front C: nudged down-right -->
  <path d="M 62 34 A 26 26 0 1 0 62 86" fill="none" stroke="url(#gFront)" stroke-width="8.5" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="112" y="62"
    font-family="'Trebuchet MS', 'Segoe UI', sans-serif"
    font-size="36"
    letter-spacing="-0.5">
    <tspan font-weight="700" fill="#FFFFFF">Contact</tspan><tspan font-weight="300" fill="#38BDF8">Connection</tspan>
  </text>

  <!-- Tagline -->
  <text x="113" y="78"
    font-family="'Trebuchet MS', 'Segoe UI', sans-serif"
    font-size="9.5"
    font-weight="400"
    letter-spacing="3"
    fill="#94A3B8">CALL CENTER PLATFORM</text>
</svg>

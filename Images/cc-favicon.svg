<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="gFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9"/>
      <stop offset="100%" style="stop-color:#0369A1"/>
    </linearGradient>
    <linearGradient id="gBack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8"/>
      <stop offset="100%" style="stop-color:#0EA5E9"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="#0A0F1A"/>

  <!-- Back C: shifted up-left, ghost -->
  <path d="M 17 4 A 9 9 0 1 0 17 22" fill="none" stroke="url(#gBack)" stroke-width="2.8" stroke-linecap="round" opacity="0.35"/>
  <!-- Front C: shifted down-right, solid -->
  <path d="M 23 10 A 9 9 0 1 0 23 28" fill="none" stroke="url(#gFront)" stroke-width="2.8" stroke-linecap="round"/>
</svg>

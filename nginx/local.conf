# Contact Connection local development reverse proxy
# Wildcard subdomain routing → API running on host via dotnet watch run
#
# Add to Windows hosts file (C:\Windows\System32\drivers\etc\hosts):
#   127.0.0.1    cc.local
#   127.0.0.1    tms.cc.local
#   127.0.0.1    demo.cc.local

server {
    listen 80;
    server_name cc.local *.cc.local;

    # Proxy all requests to the .NET API running on the host machine
    location / {
        proxy_pass         http://host.docker.internal:5135;
        proxy_http_version 1.1;

        # WebSocket / SignalR support
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Pass tenant subdomain through for resolution
        proxy_set_header   X-Tenant-Subdomain $subdomain;
    }
}

# Extract subdomain from host header for tenant resolution
map $host $subdomain {
    ~^(?<sub>[^.]+)\.cc\.local$  $sub;
    default                       "";
}
